kind = "web"
previewPath = "/"
title = "Shiva Group Events"
version = "1.0.0"
id = "artifacts/shiva-events"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18965

[services.development]
run = "pnpm --filter @workspace/shiva-events run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shiva-events", "run", "build" ]
publicDir = "artifacts/shiva-events/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18965"
BASE_PATH = "/"
